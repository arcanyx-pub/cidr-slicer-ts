name: Publish

# Triggered by `just publish`, which pushes a `v<version>` tag after the
# version-bump PR has merged to main.
on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    # Scopes the OIDC token to this environment; the npm trusted-publisher config
    # must name the same environment. Also the place to add release protection
    # rules (required reviewers, tag restrictions) in repo Settings > Environments.
    environment:
      name: release
      url: https://www.npmjs.com/package/@arcanyx/cidr-slicer
    permissions:
      contents: read
      id-token: write # required for npm trusted publishing (OIDC) + provenance
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      # Trusted publishing (OIDC) requires npm >= 11.5.1; setup-node ships older.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - run: npm run check:exports
      - run: npm test
      - run: npm publish --access public
