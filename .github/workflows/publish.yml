name: Publish

# Triggered by `just publish`, which pushes a `v<version>` tag after the
# version-bump PR has merged to main.
on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm trusted publishing (OIDC) + provenance
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      # Trusted publishing (OIDC) requires npm >= 11.5.1; setup-node ships older.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - run: npm run check:exports
      - run: npm test
      - run: npm publish --access public
